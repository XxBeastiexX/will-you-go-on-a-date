<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date?</title>
 
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
 
    .outer {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
 
    .slider {
      display: flex;
      width: 500%;
      height: 100vh;
      transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
    }
 
    .page {
      width: 20%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FF8DA1;
      padding: 2rem;
    }
 
    .heart-wrap {
      position: relative;
      width: 460px;
      height: 430px;
    }
 
    .heart-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
 
    .heart-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding-top: 40px;
    }
 
    .img-spacer {
      width: 120px;
      height: 120px;
      visibility: hidden;
    }
 
    .heart-content h1 {
      font-size: 1.9rem;
      color: #FF8DA1;
      text-align: center;
      font-weight: 700;
      padding: 0 1.5rem;
    }
 
    .arrow-btn {
      margin-top: 2rem;
      background: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      cursor: pointer;
      font-size: 1.8rem;
      color: #FF8DA1;
      transition: transform 0.2s, background 0.2s;
    }
 
    .arrow-btn:hover {
      transform: scale(1.12);
      background: #fff0f3;
    }
 
    .yesno-row {
      display: flex;
      gap: 20px;
      margin-top: 2rem;
    }
 
    .yn-btn {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s;
    }
 
    .yn-btn:hover { transform: scale(1.07); }
    .yes-btn { background: white; color: #FF8DA1; }
    .no-btn { background: #ff6b8a; color: white; }
 
    .page-title {
      font-size: 2rem;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 1.5rem;
    }
 
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 760px;
    }
 
    .day-btn {
      font-size: 0.85rem;
      font-weight: 700;
      padding: 14px 8px;
      background: white;
      color: #FF8DA1;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      white-space: pre-line;
      transition: transform 0.15s, background 0.15s;
    }
 
    .day-btn:hover {
      transform: scale(1.07);
      background: #fff0f3;
    }
 
    .yippee {
      font-size: 3.5rem;
      font-weight: 900;
      color: white;
      text-align: center;
    }
 
    .yippee-sub {
      font-size: 1.4rem;
      color: white;
      text-align: center;
      margin-top: 0.8rem;
      opacity: 0.9;
    }
 
    .chosen-day {
      font-size: 1.1rem;
      color: white;
      text-align: center;
      margin-top: 1rem;
      font-weight: 700;
      background: rgba(255,255,255,0.25);
      padding: 10px 24px;
      border-radius: 50px;
    }
 
    .hearts-anim {
      font-size: 2.8rem;
      margin-top: 1.8rem;
      animation: pop 0.6s ease both;
    }
 
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
 
<body>
 
<div class="outer">
  <div class="slider" id="slider">
 
    <svg style="display:none">
      <symbol id="heart" viewBox="0 0 300 280">
        <path d="M150,240 C150,240 20,160 20,90 C20,50 50,20 90,20 C110,20 130,30 150,50 C170,30 190,20 210,20 C250,20 280,50 280,90 C280,160 150,240 150,240 Z" fill="white"/>
      </symbol>
    </svg>
 
    <!-- Page 1 -->
    <div class="page">
      <div class="heart-wrap">
        <svg viewBox="0 0 300 280">
          <use href="#heart"></use>
        </svg>
        <div class="heart-content">
          <h1>Hello Amy :3</h1>
          <img src="cat.png" alt="cute cat" width="120">
        </div>
      </div>
      <button class="arrow-btn" onclick="go(1)">→</button>
    </div>
 
    <!-- Page 2 -->
    <div class="page">
      <div class="heart-wrap">
        <svg viewBox="0 0 300 280">
          <use href="#heart"></use>
        </svg>
        <div class="heart-content">
          <h1>you're <strong><em>reallyyy</em></strong> cute...</h1>
          <div class="img-spacer"></div>
        </div>
      </div>
      <button class="arrow-btn" onclick="go(2)">→</button>
    </div>
 
    <!-- Page 3 -->
    <div class="page">
      <div class="heart-wrap">
        <svg viewBox="0 0 300 280">
          <use href="#heart"></use>
        </svg>
        <div class="heart-content">
          <h1>Date <strong> this </strong> week?</h1>
          <div class="img-spacer"></div>
        </div>
      </div>
 
      <div class="yesno-row" id="yesno">
        <button class="yn-btn yes-btn" onclick="go(3)">Yes</button>
        <button class="yn-btn no-btn" id="noBtn">No</button>
      </div>
    </div>
 
    <!-- Page 4 -->
    <div class="page">
      <div class="page-title">What day are you free <strong> <em> cutie </em></strong>:3</div>
      <div class="days-grid" id="daysGrid"></div>
    </div>
 
    <!-- Page 5 -->
    <div class="page">
      <div class="yippee">YIPPEE!</div>
      <div class="yippee-sub">see you then :)</div>
      <div class="chosen-day" id="chosenDay"></div>
      <div class="yippee-sub">P.S. I can't see what you picked so let me know... 🤍 </div>
    </div>
 
  </div>
</div>
 
<script>
  let current = 0;
  const slider = document.getElementById('slider');
 
  function go(n) {
    current = n;
    slider.style.transform = `translateX(-${n * 20}%)`;
  }
 
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.querySelector('.yes-btn');
  const yesNoRow = document.getElementById('yesno');
 
  let swapped = false;
 
  noBtn.addEventListener('mouseenter', () => {
    yesNoRow.insertBefore(swapped ? yesBtn : noBtn, swapped ? noBtn : yesBtn);
    swapped = !swapped;
  });
 
  function getNextWeekDays() {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 
    const today = new Date();
    const daysUntilMonday = (8 - today.getDay()) % 7 || 7;
    const monday = new Date(today);
    monday.setDate(today.getDate() + daysUntilMonday);
 
    const result = [];
 
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      result.push({
        label: `${days[d.getDay()]}\n${d.getDate()} ${months[d.getMonth()]}`,
        full: `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`
      });
    }
 
    return result;
  }
 
  const grid = document.getElementById('daysGrid');
 
  getNextWeekDays().forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.textContent = day.label;
    btn.onclick = () => {
      document.getElementById('chosenDay').textContent = day.full;
      go(4);
    };
    grid.appendChild(btn);
  });
</script>
 
</body>
</html>
